name: Build openbios-qemu.elf (PPC)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: openbios-qemu.elf / ppc
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/openbios/openbios-builder:master

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Apply vgpu3d patches
        run: |
          for p in patches/*.patch; do
            echo "Applying $p"
            patch -p1 < "$p"
          done

      - name: Configure for PPC
        run: ./config/scripts/switch-arch ppc

      - name: Build
        run: make -j$(nproc)

      - name: Verify ELF artifact
        run: ls -lh obj-ppc/openbios-qemu.elf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openbios-qemu-elf
          path: obj-ppc/openbios-qemu.elf
          retention-days: 30
